<html>
    <head>
        <link rel="Stylesheet" href="style.css">
        <title>Currency Conversion</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>Use JSP Declaration Tag ,JSP Scriplet and JSP Expression In Application</h1>
        <div class="card">
            <!--Form title-->
            <h2 class="form-title">Currency Converter</h2>
            
            <form action="processCurrency.jsp" method="post">
                 <!--input field for amount-->
                 <div class="form-group">
                    <label>Amount (in RM)</label>
                    <input type="number" name="amount" step="0.01" required>
                 </div>
                 <!--Option for currency type-->
                 <div class="form-group">
                    <label>Convert to</label>
                    <select name="currencyType">
                        <option value="1">USD</option>
                        <option value="2">EURO</option>
                        <option value="3">JPY</option>
                        <option value="4">SGD</option>
                    </select>
                </div>
                <!--Submit Button-->
                <button type="submit" class="btn btn-submit">Submit</button>
            </form>
        </div>
    </body>
</html>
